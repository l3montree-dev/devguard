# postgresql database for local development
services:
  postgresql:
    image: ghcr.io/l3montree-dev/devguard/postgresql:v1.3.0
    shm_size: 1g
    # If you want to build the image locally, uncomment the following lines
    # build:
    # context: .
    # dockerfile: Dockerfile.postgres
    env_file: .env
    ports:
    - "5432:5432"
    volumes:
    - postgres:/var/lib/postgresql/data
    - ./initdb.sql:/docker-entrypoint-initdb.d/init.sql
    tmpfs: /run/postgresql:rw,uid=999,gid=999
    # command: ["postgres", "-c", "log_statement=all"] # enable to log all queries into the log


  kratos-migrate:
    image: oryd/kratos:v26.2.0-distroless@sha256:481bfc3022e5427ffb94570eef84480b99c9f8158388378c57df8c1a4a104b3d
    depends_on:
    - postgresql
    environment:
    - DSN=postgres://kratos:change-me-definitely-when-not-testing@postgresql:5432/kratos?sslmode=disable
    volumes:
    - type: bind
      source: ./.kratos
      target: /etc/config/kratos
    command: -c /etc/config/kratos/kratos.yml migrate sql -e --yes

  kratos:
    # build:
    #   context: ../kratos
    #   dockerfile: ../kratos/.docker/Dockerfile-build
    image: oryd/kratos:v26.2.0-distroless@sha256:481bfc3022e5427ffb94570eef84480b99c9f8158388378c57df8c1a4a104b3d
    depends_on:
    - kratos-migrate
    - postgresql
    ports:
    - '4433:4433' # public
    - '4434:4434' # admin
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    environment:
    - DSN=postgres://kratos:change-me-definitely-when-not-testing@postgresql:5432/kratos?sslmode=disable
    - LOG_LEVEL=trace
    volumes:
    - type: bind
      source: ./.kratos
      target: /etc/config/kratos
  jaeger:
    image: jaegertracing/jaeger:2.16.0
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # Jaeger UI

volumes:
  postgres: