rules:
  - id: missing-error-message
    languages:
      - go
    severity: ERROR
    message: |
      Missing error message or forwarded error message from internal error. Use: echo.NewHTTPError(..., "...").
      Do not concatenate the error message directly. Use fmt.Sprintf(...) instead. For example: echo.NewHTTPError(400, fmt.Sprintf("could not process request: %s", err.Error()))
    patterns:
      - pattern: echo.NewHTTPError(...)
      - pattern-not: echo.NewHTTPError(..., "...")
      - pattern-not: echo.NewHTTPError(..., fmt.Sprintf(...))
  - id: no-internal-error
    languages:
      - go
    severity: ERROR
    message: |
      Provide internal error for better logging. Use: echo.NewHTTPError(...).WithInternal(err)
    patterns:
      - pattern: echo.NewHTTPError(500)
      - pattern-not-inside: |
          echo.NewHTTPError(500).WithInternal(...)

  - id: repo-method-missing-ctx
    message: Repository method should have ctx context.Context as first parameter
    severity: WARNING
    languages: [go]
    paths:
      include:
        - "**/database/repositories/**"
    patterns:
      - pattern: func ($R $T) $METHOD(...) { ... }
      - pattern-not: func ($R $T) $METHOD(ctx context.Context, ...) { ... }
    fix-regex:
      regex: '(\) \w+\()(?!\))'
      replacement: '\1ctx context.Context, '
      count: 1

  - id: repo-method-missing-ctx-empty-params
    message: Repository method should have ctx context.Context as first parameter
    severity: WARNING
    languages: [go]
    paths:
      include:
        - "**/database/repositories/**"
    patterns:
      - pattern: func ($R $T) $METHOD() { ... }
    fix-regex:
      regex: '(\) \w+\()\)'
      replacement: '\1ctx context.Context)'
      count: 1

  - id: repo-direct-db-access
    message: Use GetDB(ctx, tx) instead of accessing the db field directly
    severity: WARNING
    languages: [go]
    paths:
      include:
        - "**/database/repositories/**"
      exclude:
        - "**/database/repositories/gorm_repository.go"
    patterns:
      - pattern: $R.db
      - pattern-not-inside: func ($R $T) GetDB(...) { ... }
      - pattern-not-inside: $R.db.WithContext(...)

  - id: repo-getdb-nil-when-tx-available
    message: tx is available as parameter, use GetDB(ctx, tx) instead of GetDB(ctx, nil)
    severity: WARNING
    languages: [go]
    paths:
      include:
        - "**/database/repositories/**"
    patterns:
      - pattern-inside: func ($RECV $TYPE) $METHOD(ctx context.Context, tx *gorm.DB, ...) { ... }
      - pattern: $R.GetDB(ctx, nil)

  - id: repo-method-missing-tx
    message: Repository method should have tx *gorm.DB as second parameter after ctx
    severity: WARNING
    languages: [go]
    paths:
      include:
        - "**/database/repositories/**"
      exclude:
        - "**/database/repositories/gorm_repository.go"
    patterns:
      - pattern: func ($R $T) $METHOD(ctx context.Context, $A $B, ...) { ... }
      - pattern-not: func ($R $T) $METHOD(ctx context.Context, tx *gorm.DB, ...) { ... }

  - id: service-method-missing-ctx
    message: Service method should have ctx context.Context as first parameter
    severity: WARNING
    languages: [go]
    paths:
      include:
        - "**/services/**"
    patterns:
      - pattern: func ($R $T) $METHOD(...) { ... }
      - pattern-not: func ($R $T) $METHOD(ctx context.Context, ...) { ... }
      - pattern-not: func ($R $T) $METHOD($C echo.Context, ...) { ... }
      - pattern-not: func ($R $T) $METHOD($C shared.Context, ...) { ... }

  - id: service-method-missing-ctx-empty-params
    message: Service method should have ctx context.Context as first parameter
    severity: WARNING
    languages: [go]
    paths:
      include:
        - "**/services/**"
    patterns:
      - pattern: func ($R $T) $METHOD() { ... }

  - id: repo-method-missing-tx-only-ctx
    message: Repository method should have tx *gorm.DB as second parameter after ctx
    severity: WARNING
    languages: [go]
    paths:
      include:
        - "**/database/repositories/**"
      exclude:
        - "**/database/repositories/gorm_repository.go"
    patterns:
      - pattern: func ($R $T) $METHOD(ctx context.Context) { ... }
      - pattern-not: func ($R $T) Begin(ctx context.Context) { ... }

  - id: tx-begin-without-defer-rollback
    message: |
      db.Begin() called without defer tx.Rollback(). Leaked transactions hold locks.
      Use: tx := db.Begin(); defer tx.Rollback(); ... ; tx.Commit()
    severity: ERROR
    languages: [go]
    patterns:
      - pattern: $TX := $DB.Begin()
      - pattern-not-inside: |
          ...
          defer $TX.Rollback()
          ...

  - id: tx-begin-without-commit
    message: |
      db.Begin() called but tx.Commit() is never called in this function.
      The transaction will always be rolled back.
    severity: ERROR
    languages: [go]
    patterns:
      - pattern: |
          $TX := $DB.Begin()
          ...
      - pattern-not-inside: |
          ...
          $TX.Commit()
          ...

  - id: http-client-missing-egress-transport
    message: |
      http.Client is missing utils.EgressTransport.
      EgressTransport adds the User-Agent header and OpenTelemetry trace propagation to all outgoing requests.
      Use: &http.Client{Transport: utils.EgressTransport, Timeout: <duration>} or utils.EgressClient directly.
    severity: WARNING
    languages: [go]
    paths:
      exclude:
        - "**/*_test.go"
        - "**/tests/**"
        - "**/utils/egress_client.go"
    patterns:
      - pattern-either:
          - pattern: "http.Client{}"
          - pattern: "&http.Client{}"
          - pattern: "http.Client{Timeout: $T}"
          - pattern: "&http.Client{Timeout: $T}"
          - pattern: "http.DefaultClient"

  - id: http-client-egress-transport-missing-timeout
    message: |
      http.Client with EgressTransport is missing a Timeout.
      Without a timeout, slow or stalled servers can block a goroutine indefinitely.
      Add a Timeout field: &http.Client{Transport: utils.EgressTransport, Timeout: 30 * time.Second}
    severity: WARNING
    languages: [go]
    paths:
      exclude:
        - "**/*_test.go"
        - "**/tests/**"
        - "**/utils/egress_client.go"
    patterns:
      - pattern-either:
          - pattern: "http.Client{Transport: utils.EgressTransport}"
          - pattern: "&http.Client{Transport: utils.EgressTransport}"

  - id: http-new-request-without-context
    message: |
      Use http.NewRequestWithContext(ctx, ...) instead of http.NewRequest(...).
      http.NewRequest uses context.Background() implicitly, which drops tracing and cancellation signals.
    severity: WARNING
    languages: [go]
    paths:
      exclude:
        - "**/*_test.go"
        - "**/tests/**"
    pattern: http.NewRequest(...)

  - id: context-background-when-ctx-available
    message: |
      context.Background() / context.TODO() used inside a function that already receives a context parameter.
      Reuse the passed-in context to propagate tracing and cancellation signals instead of starting a new root context.
    severity: WARNING
    languages: [go]
    paths:
      exclude:
        - "**/*_test.go"
        - "**/tests/**"
        - "**/cmd/**"
    patterns:
      - pattern-either:
          - pattern-inside: |
              func $NAME(..., $CTX context.Context, ...) $RET {
                ...
              }
          - pattern-inside: |
              func ($RECV $TYPE) $NAME(..., $CTX context.Context, ...) $RET {
                ...
              }
          - pattern-inside: |
              func $NAME(..., $C echo.Context, ...) $RET {
                ...
              }
          - pattern-inside: |
              func ($RECV $TYPE) $NAME(..., $C echo.Context, ...) $RET {
                ...
              }
      - pattern-not-inside: trace.ContextWithSpan(context.Background(), ...)
      - pattern-either:
          - pattern: context.Background()
          - pattern: context.TODO()

  - id: bola-raw-gorm-first-bypasses-tenant-scope
    message: |
      BOLA (Broken Object-Level Authorization) risk — OWASP API Security #1.

      A raw .First() call inside a repository method bypasses GormRepository.Read(), which
      is the central place where autoOwnershipScope appends the tenant column (asset_id /
      project_id / organization_id) to every query. Calling .First() directly returns any
      row matching the bare UUID regardless of which tenant the caller belongs to.
      Attack vector: user supplies a UUID from tenant A via tenant B's route prefix.
      Route-level RBAC authorizes the carrier path; the unscoped First() returns tenant A's
      row.

      Fix: use GormRepository.Read(ctx, tx, id) so autoTenantScope is applied automatically,
      or add an explicit tenant column to the raw query:
        .First(&t, "id = ? AND asset_id = ?", id, tenantIDs.AssetID)
    severity: ERROR
    languages: [go]
    paths:
      include:
        - "**/database/repositories/**"
      exclude:
        - "**/database/repositories/gorm_repository.go"
    patterns:
      - pattern-either:
          - pattern: $DB.First(&$T, "id = ?", $ID)
          - pattern: $DB.Where("id = ?", $ID).First(&$T)
      - pattern-not: $DB.First(&$T, "id = ? AND $REST", ...)
      - pattern-not: $DB.Where($SCOPE1, ...).Where($SCOPE2, ...).First(&$T)

  - id: bola-repository-read-override-missing-tenant-scope
    severity: ERROR
    message: |
      BOLA (Broken Object-Level Authorization) risk — OWASP API Security #1.

      This repository type overrides the generic GormRepository.Read() with a custom
      implementation (typically to add Preload chains), but does not call withOwnershipScope().
      The generic Read() applies autoOwnershipScope automatically; any override that skips it
      loses that protection and returns records across tenant boundaries.

      Fix: apply withOwnershipScope before the Preload/First chain:
        db := withOwnershipScope(ctx, repository.GetDB(ctx, tx).Where("id = ?", id), t)
        err := db.Preload(...).First(&t).Error
    languages: [go]
    paths:
      include:
        - "**/database/repositories/**"
      exclude:
        - "**/database/repositories/gorm_repository.go"
    patterns:
      - pattern-inside: |
          func ($RECV $TYPE) Read(ctx context.Context, $TX *gorm.DB, $ID $IDT) ($RET, error) {
            ...
          }
      - pattern-either:
          - pattern: $DB.First(&$T, "id = ?", $ID)
          - pattern: $DB.Where("id = ?", $ID).First(&$T)
      - pattern-not-inside: |
          func ($RECV $TYPE) Read(ctx context.Context, $TX *gorm.DB, $ID $IDT) ($RET, error) {
            ...
            withOwnershipScope(...)
            ...
          }

  - id: bola-repository-delete-missing-tenant-scope
    severity: ERROR
    message: |
      BOLA (Broken Object-Level Authorization) risk — OWASP API Security #1.

      A .Delete(...) call in a repository deletes a row by bare primary key with no
      tenant column in the WHERE clause. Unlike GormRepository.Read(), which applies
      autoOwnershipScope automatically, a plain Delete(&t, id) or
      Where("id = ?", id).Delete(...) removes any row matching the ID regardless of
      which tenant the caller belongs to.
      Attack vector: user supplies a UUID belonging to tenant A via tenant B's route
      prefix. Route-level RBAC authorizes the carrier path; the unscoped Delete()
      still deletes tenant A's row.

      Fix: scope the query with autoOwnershipScope/withOwnershipScope before deleting:
        db := withOwnershipScope(ctx, repository.GetDB(ctx, tx).Where("id = ?", id), t)
        return db.Delete(&t).Error
      or add an explicit tenant column to the query:
        .Where("id = ? AND asset_id = ?", id, tenantIDs.AssetID).Delete(&t)
    languages: [go]
    paths:
      include:
        - "**/database/repositories/**"
    patterns:
      - pattern-inside: |
          func ($RECV $TYPE) $METHOD(...) $RETTYPE {
            ...
          }
      - pattern-either:
          - pattern: $DB.Delete(&$T, $ID)
          - pattern: $DB.Delete(&$T, "id = ?", $ID)
          - pattern: $DB.Where("id = ?", $ID).Delete(&$T)
      - pattern-not: $DB.Delete(&$T, "id = ? AND $REST", ...)
      - pattern-not-inside: |
          func ($RECV $TYPE) $METHOD(...) $RETTYPE {
            ...
            autoOwnershipScope(...)
            ...
          }
      - pattern-not-inside: |
          func ($RECV $TYPE) $METHOD(...) $RETTYPE {
            ...
            withOwnershipScope(...)
            ...
          }

  - id: session-getactorid-without-sessionactortype
    severity: WARNING
    message: |
      shared.AuthSession.GetActorID() is used without checking GetSessionActorType() in
      the same function.

      A session's actor ID is only meaningful together with its actor type: the same
      string is a user ID for a user-scoped token, but an org/project/asset ID for a
      PAT scoped to that resource (see shared.SessionActorUser/SessionActorOrg/
      SessionActorProject/SessionActorAsset). Code that reads GetActorID() and treats
      it as if it were always a user ID (e.g. hardcoding a "user::" prefix for a casbin
      subject) silently mis-authorizes non-user-owned tokens instead of erroring or
      branching per actor type.

      Fix: branch on session.GetSessionActorType() (see accesscontrol.GetAllProjectsForSession
      / GetAllAssetsForSession for the expected pattern), or use session.GetActorName()
      instead of GetActorID() when the value is only used as an audit/actor stamp (not
      a real identity lookup) — see accesscontrol/session.go's GetActorName.
    languages: [go]
    paths:
      exclude:
        - "**/*_test.go"
        - "**/tests/**"
        - "**/mocks/**"
    patterns:
      - pattern: $SESSION.GetActorID()
      - pattern-not-inside: |
          func $F(...) $RET {
            ...
            $SESSION.GetSessionActorType()
            ...
          }
      - pattern-not-inside: |
          func ($RECV $TYPE) $F(...) $RET {
            ...
            $SESSION.GetSessionActorType()
            ...
          }
      - pattern-not-inside: |
          func(...) $RET {
            ...
            $SESSION.GetSessionActorType()
            ...
          }
      - pattern-not-inside: |
          func(...) {
            ...
            $SESSION.GetSessionActorType()
            ...
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            ...
            if $SESSION.GetSessionActorType() != $X {
              ...
            }
            ...
          }
      - pattern-not-inside: |
          func ($RECV $TYPE) $F(...) $RET {
            ...
            if $SESSION.GetSessionActorType() != $X {
              ...
            }
            ...
          }
      - pattern-not-inside: |
          func(...) $RET {
            ...
            if $SESSION.GetSessionActorType() != $X {
              ...
            }
            ...
          }
      - pattern-not-inside: |
          func(...) {
            ...
            if $SESSION.GetSessionActorType() != $X {
              ...
            }
            ...
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            ...
            switch $SESSION.GetSessionActorType() {
            case $C: ...
            }
            ...
          }
      - pattern-not-inside: |
          func ($RECV $TYPE) $F(...) $RET {
            ...
            switch $SESSION.GetSessionActorType() {
            case $C: ...
            }
            ...
          }
      - pattern-not-inside: |
          func(...) $RET {
            ...
            switch $SESSION.GetSessionActorType() {
            case $C: ...
            }
            ...
          }
      - pattern-not-inside: |
          func(...) {
            ...
            switch $SESSION.GetSessionActorType() {
            case $C: ...
            }
            ...
          }

  - id: project-asset-route-group-param-name-mismatch
    severity: ERROR
    message: |
      A project- or asset-scoped route group must use the exact path param names
      :projectSlug / :assetSlug.

      middlewares.ResourceFetchMiddleware is the single place that resolves the
      organization/project/asset for every request - it does so by reading these
      exact param names (shared.GetProjectSlug/GetAssetSlug), once, before any
      RBAC check or handler runs. A route group that scopes to a project or asset
      using a differently-named param (:projectId, :project, :assetID, ...)
      silently breaks resolution: ResourceFetchMiddleware treats the route as if
      it carried no project/asset at all, IsAllowedInProject/IsAllowedInAsset
      never run for it, and shared.GetProject(ctx)/GetAsset(ctx) will panic in
      whatever handler expects them to be set.

      Fix: name the param exactly :projectSlug or :assetSlug.
    languages: [go]
    paths:
      include:
        - "**/router/**"
      exclude:
        - "**/*_test.go"
    pattern-regex: '\.Group\("/(projects/:(?!projectSlug\b)\w+|assets/:(?!assetSlug\b)\w+)'

  - id: bola-repository-update-missing-tenant-scope
    severity: ERROR
    message: |
      BOLA (Broken Object-Level Authorization) risk — OWASP API Security #1.

      A raw .Where("id = ?", id).Update(...)/.Updates(...) call in a repository mutates
      a row by bare primary key with no tenant column in the WHERE clause. Unlike
      GormRepository.Save(), which mutates an already-fetched (and therefore
      tenant-verified) struct, this form re-resolves the row by a user-suppliable ID
      with no ownership check.
      Attack vector: user supplies a UUID belonging to tenant A via tenant B's route
      prefix. Route-level RBAC authorizes the carrier path; the unscoped
      Where/Update still mutates tenant A's row.

      Fix: scope the query with autoOwnershipScope/withOwnershipScope before updating:
        db := withOwnershipScope(ctx, repository.GetDB(ctx, tx).Where("id = ?", id), t)
        return db.Update("field", value).Error
      or add an explicit tenant column to the query:
        .Where("id = ? AND asset_id = ?", id, tenantIDs.AssetID).Update("field", value)
      or, if the ID is already derived from a tenant-verified object in the same
      request (e.g. fetched via a scoped Read, or proven by possession such as a
      token fingerprint), this finding is a false positive — document why with a
      nosemgrep comment.
    languages: [go]
    paths:
      include:
        - "**/database/repositories/**"
    patterns:
      - pattern-inside: |
          func ($RECV $TYPE) $METHOD(...) $RETTYPE {
            ...
          }
      - pattern-either:
          - pattern: $DB.Where("id = ?", $ID).Update(...)
          - pattern: $DB.Where("id = ?", $ID).Updates(...)
          - pattern: $DB.Model(&$T).Where("id = ?", $ID).Update(...)
          - pattern: $DB.Model(&$T).Where("id = ?", $ID).Updates(...)
      - pattern-not: $DB.Where("id = ? AND $REST", ...).$METHOD2(...)
      - pattern-not-inside: |
          func ($RECV $TYPE) $METHOD(...) $RETTYPE {
            ...
            autoOwnershipScope(...)
            ...
          }
      - pattern-not-inside: |
          func ($RECV $TYPE) $METHOD(...) $RETTYPE {
            ...
            withOwnershipScope(...)
            ...
          }
